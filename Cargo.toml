[workspace]
resolver = "2"
members = [
    "crates/solobase",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
# Cross-repo: wafer-run monorepo
# TODO: switch to git deps after pushing wafer-run to GitHub:
#   wafer-run = { git = "https://github.com/wafer-run/wafer-run", features = ["full"] }
#   wafer-core = { git = "https://github.com/wafer-run/wafer-run" }
wafer-run = { path = "../wafer-run/crates/wafer-run", features = ["full"] }
wafer-core = { path = "../wafer-run/crates/wafer-core" }

# Core
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# HTTP
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "fs", "compression-gzip"] }

# Crypto
argon2 = "0.5"
password-hash = { version = "0.5", features = ["getrandom"] }
jsonwebtoken = "9"

# Embedded assets
rust-embed = { version = "8", features = ["mime-guess"] }

# Network
reqwest = { version = "0.12", features = ["json", "blocking"] }
