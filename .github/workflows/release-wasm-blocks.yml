name: Release WASM Blocks

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-wasm-blocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-tools
        run: cargo install wasm-tools

      - name: Build and package all WASM blocks
        run: |
          BLOCKS=(system auth profile userportal legalpages admin files products deployments)
          mkdir -p dist/

          for block in "${BLOCKS[@]}"; do
            CRATE_DIR="blocks/${block}"
            CRATE_NAME="solobase_block_${block}"

            echo "=== Building ${block} ==="
            cargo build \
              --target wasm32-unknown-unknown \
              --release \
              --manifest-path "${CRATE_DIR}/Cargo.toml"

            WASM="${CRATE_DIR}/target/wasm32-unknown-unknown/release/${CRATE_NAME}.wasm"
            COMPONENT="dist/${block}.component.wasm"

            wasm-tools component new "${WASM}" -o "${COMPONENT}"
            wasm-tools validate "${COMPONENT}"

            SIZE=$(ls -lh "${COMPONENT}" | awk '{print $5}')
            echo "${block}: ${SIZE}"
          done

      - name: Upload WASM Components to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.component.wasm

  update-registry:
    needs: build-wasm-blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Update registry manifests
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          BLOCKS=(system auth profile userportal legalpages admin files products deployments)
          mkdir -p registry-update/suppers-ai

          for block in "${BLOCKS[@]}"; do
            mkdir -p "registry-update/suppers-ai/${block}"
            cat > "registry-update/suppers-ai/${block}/manifest.json" << EOF
          {
            "name": "suppers-ai/${block}",
            "latest": "${TAG#v}",
            "versions": {
              "${TAG#v}": {
                "abi": 1,
                "wasm_url": "https://github.com/suppers-ai/solobase/releases/download/${TAG}/${block}.component.wasm",
                "crate": "solobase-core"
              }
            }
          }
          EOF
          done

      - name: Push to registry
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.REGISTRY_TOKEN }}
        with:
          source_file: 'registry-update/suppers-ai'
          destination_repo: 'wafer-run/registry'
          destination_folder: 'suppers-ai'
          user_email: 'ci@suppers.ai'
          user_name: 'solobase-ci'
          commit_message: 'chore: update suppers-ai block manifests for ${{ steps.version.outputs.tag }}'
