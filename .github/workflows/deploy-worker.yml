name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'crates/solobase-cloudflare/**'
      - 'crates/solobase-worker/**'
      - 'crates/solobase-core/**'
      - 'crates/solobase/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/solobase-cloudflare
            crates/solobase-worker

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker-build and wrangler
        run: |
          cargo install worker-build
          npm install -g wrangler

      # 1. Build and deploy the dispatch worker
      - name: Deploy dispatch worker
        working-directory: crates/solobase-cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy --env production

      # 2. Build the user worker
      - name: Build user worker
        working-directory: crates/solobase-worker
        run: worker-build --release

      # 3. Upload user worker artifacts to R2
      - name: Upload user worker artifacts to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 object put "solobase-storage/_system/worker/index.js" \
            --file crates/solobase-worker/build/index.js \
            --content-type "application/javascript" --remote
          wrangler r2 object put "solobase-storage/_system/worker/index_bg.wasm" \
            --file crates/solobase-worker/build/index_bg.wasm \
            --content-type "application/wasm" --remote

      # 4. Update all existing user workers with new code
      - name: Deploy code to all user workers
        env:
          CONTROL_API_KEY: ${{ secrets.CONTROL_API_KEY }}
          PLATFORM_URL: ${{ vars.PLATFORM_URL || 'https://cloud.solobase.dev' }}
        run: |
          curl -sf -X POST "$PLATFORM_URL/_control/deploy" \
            -H "X-Control-Api-Key: $CONTROL_API_KEY" \
            -H "Content-Type: application/json" \
            --max-time 120 || echo "Warning: deploy endpoint returned non-zero"

      # 5. Run migrations on all user workers
      - name: Run migrations on all user workers
        env:
          CONTROL_API_KEY: ${{ secrets.CONTROL_API_KEY }}
          PLATFORM_URL: ${{ vars.PLATFORM_URL || 'https://cloud.solobase.dev' }}
        run: |
          curl -sf -X POST "$PLATFORM_URL/_control/migrate-workers" \
            -H "X-Control-Api-Key: $CONTROL_API_KEY" \
            -H "Content-Type: application/json" \
            --max-time 120 || echo "Warning: migrate-workers endpoint returned non-zero"

