name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'crates/solobase-cloudflare/**'
      - 'crates/solobase-worker/**'
      - 'crates/solobase-core/**'
      - 'crates/solobase/**'
      - 'packages/cloud-dashboard/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/solobase-cloudflare
            crates/solobase-worker

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install worker-build and wrangler
        run: |
          cargo install worker-build
          npm install -g wrangler

      # Build cloud dashboard
      - name: Build cloud dashboard
        working-directory: packages/cloud-dashboard
        run: |
          npm ci
          npx vite build

      # Build user worker
      - name: Build user worker
        working-directory: crates/solobase-worker
        run: worker-build --release

      # Upload artifacts for deploy jobs
      - uses: actions/upload-artifact@v4
        with:
          name: worker-build
          path: |
            crates/solobase-worker/build/index.js
            crates/solobase-worker/build/index_bg.wasm
            packages/cloud-dashboard/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [development, production]
    environment: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/solobase-cloudflare

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - uses: actions/download-artifact@v4
        with:
          name: worker-build

      # 0. Upload cloud dashboard to R2
      - name: Upload cloud dashboard to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: solobase-${{ matrix.env }}-cloud
        run: |
          wrangler r2 object put "$R2_BUCKET/site/index.html" \
            --file packages/cloud-dashboard/dist/index.html --content-type "text/html" --remote
          for f in packages/cloud-dashboard/dist/assets/*.js; do
            wrangler r2 object put "$R2_BUCKET/site/assets/$(basename $f)" \
              --file "$f" --content-type "application/javascript" --remote
          done
          for f in packages/cloud-dashboard/dist/assets/*.css; do
            wrangler r2 object put "$R2_BUCKET/site/assets/$(basename $f)" \
              --file "$f" --content-type "text/css" --remote
          done

      # 1. Deploy dispatch worker
      - name: Deploy dispatch worker
        working-directory: crates/solobase-cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_ENV: ${{ matrix.env == 'production' && 'production' || '' }}
        run: wrangler deploy ${{ matrix.env == 'production' && '--env production' || '' }}

      # 2. Run platform schema migrations (seeds cloud project row, usage tables)
      - name: Run platform migrations
        env:
          CONTROL_API_KEY: ${{ secrets.CONTROL_API_KEY }}
          PLATFORM_URL: ${{ vars.PLATFORM_URL }}
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$PLATFORM_URL/_control/migrate" \
            -H "X-Control-Api-Key: $CONTROL_API_KEY" \
            -H "Content-Type: application/json" \
            --max-time 30) || true
          http_status=$(echo "$response" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_status"
          echo "Response: $body"

      # 3. Upload user worker artifacts to R2

      - name: Upload user worker artifacts to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ matrix.env == 'production' && 'solobase-production' || 'solobase-development' }}
        run: |
          wrangler r2 object put "$R2_BUCKET/_system/worker/index.js" \
            --file crates/solobase-worker/build/index.js \
            --content-type "application/javascript" --remote
          wrangler r2 object put "$R2_BUCKET/_system/worker/index_bg.wasm" \
            --file crates/solobase-worker/build/index_bg.wasm \
            --content-type "application/wasm" --remote

      # 4. Deploy code to all user workers
      - name: Deploy code to all user workers
        env:
          CONTROL_API_KEY: ${{ secrets.CONTROL_API_KEY }}
          PLATFORM_URL: ${{ vars.PLATFORM_URL }}
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$PLATFORM_URL/_control/deploy" \
            -H "X-Control-Api-Key: $CONTROL_API_KEY" \
            -H "Content-Type: application/json" \
            --max-time 120) || true
          http_status=$(echo "$response" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_status"
          echo "Response: $body"
          if [ "$http_status" -ge 400 ] 2>/dev/null || [ -z "$http_status" ]; then
            echo "::warning::deploy endpoint returned HTTP $http_status"
          fi

      # 5. Run migrations on all user workers
      - name: Run migrations on all user workers
        env:
          CONTROL_API_KEY: ${{ secrets.CONTROL_API_KEY }}
          PLATFORM_URL: ${{ vars.PLATFORM_URL }}
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$PLATFORM_URL/_control/migrate-workers" \
            -H "X-Control-Api-Key: $CONTROL_API_KEY" \
            -H "Content-Type: application/json" \
            --max-time 120) || true
          http_status=$(echo "$response" | tail -1 | sed 's/HTTP_STATUS://')
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_status"
          echo "Response: $body"
          if [ "$http_status" -ge 400 ] 2>/dev/null || [ -z "$http_status" ]; then
            echo "::warning::migrate-workers endpoint returned HTTP $http_status"
          fi
