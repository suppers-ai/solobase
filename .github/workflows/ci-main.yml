name: CI Main

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'packages/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci-main.yml'

concurrency:
  group: ci-main
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # The solobase crate's build.rs `include_bytes!`s the solobase-web wasm, so
  # every job that compiles the workspace previously ran `wasm-pack build
  # --release` itself. Build it once here and share `pkg/` as an artifact.
  build-wasm:
    name: Build solobase-web wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: cd crates/solobase-web && wasm-pack build --target web --release --out-dir pkg

      - name: Upload pkg/ artifact
        uses: actions/upload-artifact@v4
        with:
          name: solobase-web-pkg
          path: crates/solobase-web/pkg/
          retention-days: 1

  check:
    name: Format & Lint
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: check

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      # clippy compiles solobase, whose build.rs `include_bytes!`s the
      # solobase-web wasm. Download the prebuilt pkg/ so build.rs finds it.
      - name: Download solobase-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: solobase-web-pkg
          path: crates/solobase-web/pkg

      - name: Run clippy
        run: cargo clippy --workspace --exclude solobase-web --exclude solobase-cloudflare

  test:
    name: Tests
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test

      # The solobase crate's build.rs `include_bytes!`s the solobase-web wasm;
      # without it `cargo test --workspace` fails before any test runs.
      - name: Download solobase-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: solobase-web-pkg
          path: crates/solobase-web/pkg

      - name: Run tests
        run: cargo test --workspace --exclude solobase-web --exclude solobase-cloudflare

  wasm:
    name: Cloudflare wasm32 check
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cloudflare

      # build.rs prereq for any solobase crate pulled into the cloudflare build.
      - name: Download solobase-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: solobase-web-pkg
          path: crates/solobase-web/pkg

      # solobase-cloudflare is wasm-only (cdylib targeting CF Workers).
      - name: Check solobase-cloudflare (wasm32)
        run: cargo check -p solobase-cloudflare --target wasm32-unknown-unknown

      # Browser-target crates are also wasm-only consumers of wafer-run, and
      # nothing else in CI builds them for wasm32 — a set_asset_loader
      # signature break sat silently red on main for 5 days before the
      # solobase #253 review caught it.
      - name: Check solobase-browser + minimal-browser (wasm32)
        run: cargo check -p solobase-browser -p minimal-browser --target wasm32-unknown-unknown

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Run audit
        run: cargo audit

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout wafer-run (for local dependency)
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: "Build wafer-client-js (file: dep needs dist for tsc)"
        working-directory: ../wafer-run/packages/wafer-client-js
        run: |
          npm ci
          npm run build

      - name: Install and build SDK
        working-directory: packages/solobase-js
        run: |
          npm ci
          npm run build
          npm run lint

  cross-compile:
    name: Cross-Compile (${{ matrix.name }})
    needs: build-wasm
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-amd64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: windows-amd64
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cross-${{ matrix.name }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install cross-compilation tools (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      # solobase's build.rs `include_bytes!`s the solobase-web wasm; the wasm is
      # platform-independent, so download the shared artifact rather than
      # rebuilding it on every target (including the macOS runners).
      - name: Download solobase-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: solobase-web-pkg
          path: crates/solobase-web/pkg

      - name: Build
        run: cargo build -p solobase --release --target ${{ matrix.target }}

  coverage:
    name: Coverage
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: coverage

      # solobase's build.rs `include_bytes!`s the solobase-web wasm;
      # llvm-cov compiles the workspace, so the prebuilt pkg/ must be present.
      - name: Download solobase-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: solobase-web-pkg
          path: crates/solobase-web/pkg

      - name: Generate coverage
        run: cargo llvm-cov --workspace --exclude solobase-web --exclude solobase-cloudflare --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
