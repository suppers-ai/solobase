name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'packages/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: check

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --exclude solobase-web

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test

      - name: Run tests
        run: cargo test --workspace --exclude solobase-web

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: cd crates/solobase-web && wasm-pack build --target web --release

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: e2e

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build solobase-web (framework assets + hashed pkg/)
        run: cd crates/solobase-web && make build

      - name: Install Playwright
        working-directory: crates/solobase-web
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Serve pkg/ in background
        working-directory: crates/solobase-web
        run: |
          python3 -m http.server 8080 -d pkg &
          echo $! > /tmp/http-pid
          # Wait for server to accept connections
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/sw.js > /dev/null; then
              break
            fi
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: crates/solobase-web
        run: npx playwright test --config=tests/playwright.config.ts tests/e2e/smoke.spec.ts

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/http-pid ]; then
            kill "$(cat /tmp/http-pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: crates/solobase-web/playwright-report/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      - name: Run audit
        run: cargo audit

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for SDK changes
        id: sdk-changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- packages/solobase-js/)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.sdk-changes.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout wafer-run (for local dependency)
        if: steps.sdk-changes.outputs.skip != 'true'
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: "Build wafer-client-js (file: dep needs dist for tsc)"
        if: steps.sdk-changes.outputs.skip != 'true'
        working-directory: ../wafer-run/packages/wafer-client-js
        run: |
          npm ci
          npm run build

      - name: Install and build SDK
        if: steps.sdk-changes.outputs.skip != 'true'
        working-directory: packages/solobase-js
        run: |
          npm ci
          npm run build
          npm run lint
