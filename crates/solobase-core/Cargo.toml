[package]
name = "solobase-core"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Solobase shared platform abstraction — routing, crypto, features, pipeline, and backend block factories"

[lib]
name = "solobase_core"
path = "src/lib.rs"

[features]
default = ["sqlite", "storage-local"]
sqlite = []
postgres = ["dep:tokio"]
storage-local = []
storage-s3 = ["dep:tokio"]

[dependencies]
# WAFER types (minimal — no full runtime)
wafer-run = { path = "../../../wafer-run/crates/wafer-run", default-features = false }
# wafer-core for clients and interface traits
wafer-core = { path = "../../../wafer-run/crates/wafer-core" }

# Plan definitions (shared with CF worker)
solobase-plans = { path = "../solobase-plans" }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Crypto
sha2 = { workspace = true }
hmac = "0.12"
base64 = "0.22"
argon2 = { version = "0.5", default-features = false, features = ["alloc", "rand"] }
getrandom = "0.2"

# Time
chrono = { workspace = true }

# Async
async-trait = { workspace = true }
tokio = { workspace = true, optional = true }

# HTML sanitization
ammonia = "4"

# SSR templating
maud = "0.26"

# Logging
tracing = "0.1"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
