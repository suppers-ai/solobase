name = "solobase-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-01"

[build]
command = "cargo install worker-build && worker-build --release"

# This file is only used for building the worker WASM artifact.
# In production, user workers are deployed via the CF API with per-project
# bindings (D1, R2, vars) — no bindings are defined here.
