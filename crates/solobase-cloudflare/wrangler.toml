name = "solobase-development"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-01"

[build]
command = "cargo install worker-build && worker-build --release"

# =============================================================================
# Default environment (development)
# =============================================================================
#
# Deployed via: npx wrangler deploy
# Secrets:      npx wrangler secret put CONTROL_API_KEY
#               npx wrangler secret put CF_API_TOKEN
#               npx wrangler secret put CF_ACCOUNT_ID

[vars]
ENVIRONMENT = "development"
DISPATCHER_NAMESPACE = "solobase-workers-dev"
R2_BUCKET_NAME = "solobase-development"

[[d1_databases]]
binding = "DB"
database_name = "solobase-development"
database_id = "e6d6d94f-4383-4b89-9317-065c143207d8"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "solobase-development"

[[dispatch_namespaces]]
binding = "DISPATCHER"
namespace = "solobase-workers-dev"

# =============================================================================
# Production environment
# =============================================================================
#
# Deployed via: npx wrangler deploy --env production
# Secrets:      npx wrangler secret put CONTROL_API_KEY --env production
#               npx wrangler secret put CF_API_TOKEN --env production
#               npx wrangler secret put CF_ACCOUNT_ID --env production

[env.production]
name = "solobase-production"

[env.production.vars]
ENVIRONMENT = "production"
DISPATCHER_NAMESPACE = "solobase-workers"
R2_BUCKET_NAME = "solobase-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "solobase-production"
database_id = "14c17526-8172-4f3b-aa14-3ac7a617a25e"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "solobase-production"

[[env.production.dispatch_namespaces]]
binding = "DISPATCHER"
namespace = "solobase-workers"
