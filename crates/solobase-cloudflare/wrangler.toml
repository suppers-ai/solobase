name = "solobase-development"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-01"

[build]
command = "cargo install worker-build && worker-build --release"

# =============================================================================
# Default environment (development)
# =============================================================================
#
# Deployed via: npx wrangler deploy
# Secrets:      npx wrangler secret put JWT_SECRET
#               npx wrangler secret put ADMIN_SECRET
#               npx wrangler secret put MAILGUN_API_KEY
#               npx wrangler secret put MAILGUN_DOMAIN
#               npx wrangler secret put MAILGUN_FROM
#               npx wrangler secret put MAILGUN_REPLY_TO

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "solobase-db-dev"
database_id = "b2da17b4-a047-4e61-b61b-6f5b25613b7c"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "solobase-storage-dev"

[[kv_namespaces]]
binding = "PROJECTS"
id = "e78c1706611f4c03b723fda81ae7c22e"

# =============================================================================
# Production environment
# =============================================================================
#
# Deployed via: npx wrangler deploy --env production
# Secrets:      npx wrangler secret put JWT_SECRET --env production
#               npx wrangler secret put ADMIN_SECRET --env production
#               npx wrangler secret put MAILGUN_API_KEY --env production
#               npx wrangler secret put MAILGUN_DOMAIN --env production
#               npx wrangler secret put MAILGUN_FROM --env production
#               npx wrangler secret put MAILGUN_REPLY_TO --env production

[env.production]
name = "solobase-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "solobase-db"
database_id = "4e2ec8f8-fc62-440a-8406-7bc522045c12"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "solobase-storage"

[[env.production.kv_namespaces]]
binding = "PROJECTS"
id = "4b124a049ff04024b71c27d2ef02b181"
