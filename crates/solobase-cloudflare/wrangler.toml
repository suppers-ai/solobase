name = "solobase-development"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-01"

[build]
command = "cargo install worker-build && worker-build --release"

# =============================================================================
# Default environment (development / local)
# =============================================================================

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "solobase-db-dev"
database_id = "local-dev-db"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "solobase-storage-dev"

[[kv_namespaces]]
binding = "PROJECTS"
id = "local-dev-kv"

# =============================================================================
# Production environment
# =============================================================================

[env.production]
name = "solobase-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "solobase-db"
database_id = "4e2ec8f8-fc62-440a-8406-7bc522045c12"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "solobase-storage"

[[env.production.kv_namespaces]]
binding = "PROJECTS"
id = "4b124a049ff04024b71c27d2ef02b181"
