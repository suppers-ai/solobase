[package]
name = "solobase-cloudflare"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Solobase on Cloudflare Workers — multi-tenant WAFER runtime adapter"

[lib]
crate-type = ["cdylib"]

[dependencies]
# WAFER runtime (types + meta only, no full runtime)
wafer-run = { path = "../../../wafer-run/crates/wafer-run", default-features = false }

# Solobase blocks (no server features — just the block implementations)
solobase = { path = "../solobase", default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Time
chrono = { version = "0.4", features = ["serde", "wasmbind"] }

# Crypto
sha2 = "0.10"
base64 = "0.22"
hmac = "0.12"
argon2 = { version = "0.5", default-features = false, features = ["alloc", "rand"] }
uuid = { version = "1", features = ["v4", "js"] }
getrandom = { version = "0.2", features = ["js"] }

# Async
async-trait = "0.1"

# Cloudflare Worker
worker = { version = "0.7.5", features = ["d1"] }
wasm-bindgen = "0.2"
