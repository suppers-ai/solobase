[package]
name = "solobase-cloudflare"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Solobase Dispatch Worker — thin routing layer for Workers for Platforms"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Time (for usage tracking)
chrono = { version = "0.4", features = ["serde", "wasmbind"] }

# Crypto (for admin secret verification)
sha2 = "0.10"

# UUID (for project ID generation)
uuid = { version = "1", features = ["v4", "js"] }
getrandom = { version = "0.2", features = ["js"] }

# Cloudflare Worker
worker = { version = "0.7.5", features = ["d1"] }
wasm-bindgen = "0.2"

# For CF API multipart uploads
js-sys = "0.3"
