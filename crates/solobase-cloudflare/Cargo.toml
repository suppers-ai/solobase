[package]
name = "solobase-cloudflare"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Solobase on Cloudflare Workers — multi-tenant WAFER runtime adapter"

[lib]
crate-type = ["cdylib"]

[dependencies]
# WAFER runtime (types + meta only, no full runtime)
wafer-run = { path = "../../../wafer-run/crates/wafer-run", default-features = false }

# Solobase blocks (no server features — just the block implementations)
solobase = { path = "../solobase", default-features = false }

# Solobase shared core (routing, crypto, features, pipeline)
solobase-core = { path = "../solobase-core", default-features = false }

# WAFER core blocks (shared DatabaseService/StorageService traits + handlers)
wafer-core = { path = "../../../wafer-run/crates/wafer-core", default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Time
chrono = { version = "0.4", features = ["serde", "wasmbind"] }

# Crypto (sha2, hmac, argon2, base64 now in solobase-core)
uuid = { version = "1", features = ["v4", "js"] }
getrandom = { version = "0.2", features = ["js"] }

# Async
async-trait = "0.1"

# Cloudflare Worker
worker = { version = "0.7.5", features = ["d1"] }
wasm-bindgen = "0.2"
