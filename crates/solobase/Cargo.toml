[package]
name = "solobase"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Solobase — self-hosted backend platform powered by the WAFER runtime"

[lib]
name = "solobase"
path = "src/lib.rs"

[[bin]]
name = "solobase"
path = "src/main.rs"
required-features = ["server"]

[features]
default = ["server"]
server = [
    "wafer-run/full",
    "wafer-core/full",
    "wafer-core/http",
    "dep:tokio",
    "dep:tracing-subscriber",
]
storage-s3 = ["solobase-core/storage-s3"]
postgres = ["solobase-core/postgres"]

[dependencies]
# WAFER runtime and shared blocks (minimal — types + clients only)
wafer-run = { path = "../../../wafer-run/crates/wafer-run", default-features = false }
wafer-core = { path = "../../../wafer-run/crates/wafer-core", default-features = false }

# Solobase shared core (routing, crypto, features, pipeline, backend blocks)
solobase-core = { path = "../solobase-core" }

# Async
async-trait = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Async runtime (only needed for the server binary)
tokio = { workspace = true, optional = true }

# Observability
tracing = { workspace = true }
tracing-subscriber = { workspace = true, optional = true }

# Crypto
sha2 = { workspace = true }
hmac = "0.12"

# Time
chrono = { workspace = true }
