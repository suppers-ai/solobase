[package]
name = "solobase"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Solobase — self-hosted backend platform powered by the WAFER runtime"

[lib]
name = "solobase"
path = "src/lib.rs"

[features]
# Enable WASM block loading via the wasmi interpreter for auto-discovery.
wasm = ["wafer-run/wasm"]

[dependencies]
# WAFER runtime (minimal — types + clients only, no tokio/wasmi/reqwest)
wafer-run = { workspace = true }
wafer-core = { workspace = true }

# Middleware blocks (always registered by the builder)
wafer-block-auth-validator = { workspace = true }
wafer-block-cors = { workspace = true }
wafer-block-iam-guard = { workspace = true }
wafer-block-inspector = { workspace = true }
wafer-block-readonly-guard = { workspace = true }
wafer-block-router = { workspace = true }
wafer-block-security-headers = { workspace = true }
wafer-block-web = { workspace = true }

# Service block config (needed by builder for ConfigService trait)
wafer-block-config = { workspace = true }
wafer-block-crypto = { workspace = true }

# Solobase shared core (routing, crypto, features, pipeline, backend blocks)
solobase-core = { path = "../solobase-core", default-features = false }

# Async
async-trait = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Observability
tracing = { workspace = true }

# Crypto
sha2 = { workspace = true }
hmac = "0.12"
getrandom = "0.2"

# Time
chrono = { workspace = true }

# Utils
uuid = { workspace = true }

[lints]
workspace = true
